<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系所簡介 — 國立中央大學物理學系</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#1a2f4a; --blue:#1f4e79; --sky:#2e7fc1;
  --accent:#c8972b; --gold:#e4b84a;
  --light:#f0f5fb; --lighter:#f8fafc;
  --text:#1e2a38; --muted:#5a6a7a;
  --border:#cddaeb; --white:#fff;
  --serif:'Georgia','Times New Roman',serif;
  --sans:'Segoe UI',system-ui,sans-serif;
}

body{font-family:var(--sans);background:var(--lighter);color:var(--text);line-height:1.7}

/* ── Overlay ── */
@keyframes spin{to{transform:rotate(360deg)}}

#overlay{
  position:fixed;inset:0;z-index:300;
  background:linear-gradient(160deg,#0d1f33 0%,#1a3a5c 60%,#0d2640 100%);
  display:flex;align-items:center;justify-content:center;
}
.welcome-box{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);
  border-radius:20px;padding:3rem 3.5rem;text-align:center;color:var(--white);
  max-width:460px;width:90%;backdrop-filter:blur(8px);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.welcome-logo{
  width:72px;height:72px;background:var(--accent);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:900;color:var(--navy);margin:0 auto 1.4rem;
  box-shadow:0 8px 24px rgba(200,151,43,.4);
}
.welcome-box h2{font-size:1.25rem;font-weight:700;letter-spacing:.02em}
.welcome-sub{font-size:.73rem;opacity:.5;letter-spacing:.1em;text-transform:uppercase;margin-top:.4rem}
.welcome-divider{width:48px;height:2px;background:var(--accent);margin:1.6rem auto;border-radius:1px}
.welcome-hint{font-size:.9rem;opacity:.8;margin-bottom:1.4rem}
.welcome-spinner{
  margin:1rem auto;width:32px;height:32px;
  border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;
}
.welcome-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  background:var(--accent);color:var(--navy);border-radius:10px;
  padding:.85rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(200,151,43,.35);
}
.welcome-btn:hover{background:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,151,43,.5)}
.welcome-btn:active{transform:translateY(0)}
.welcome-note{font-size:.72rem;opacity:.4;margin-top:1.4rem}

/* ── Header ── */
.site-header{
  background:var(--navy);color:var(--white);
  padding:0 2rem;display:flex;align-items:center;gap:1.2rem;
  height:64px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.logo-mark{
  width:38px;height:38px;background:var(--accent);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:var(--navy);flex-shrink:0;
}
.titles{flex:1;min-width:0}
.titles h1{font-size:1rem;font-weight:700;letter-spacing:.04em}
.titles p{font-size:.68rem;opacity:.7;letter-spacing:.08em;text-transform:uppercase}
#excel-status{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:.25rem .9rem;font-size:.72rem;
  color:var(--gold);white-space:nowrap;flex-shrink:0;
}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 64px)}

/* ── Sidebar ── */
.sidebar{
  background:var(--navy);padding:1.5rem 0;
  position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;
}
.sidebar-label{
  font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(255,255,255,.4);padding:0 1.4rem;margin-bottom:.6rem;
}
.nav-item{
  display:flex;align-items:center;padding:.75rem 1.4rem;
  color:rgba(255,255,255,.7);cursor:pointer;
  border-left:3px solid transparent;transition:all .18s;font-size:.9rem;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--white)}
.nav-item.active{background:rgba(200,151,43,.15);border-left-color:var(--accent);color:var(--gold);font-weight:600}

/* ── Content ── */
.content{padding:2.5rem 3rem;max-width:1100px}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Page hero ── */
.page-hero{
  border-radius:12px;overflow:hidden;margin-bottom:2.4rem;
  position:relative;min-height:160px;
  background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);
  display:flex;align-items:flex-end;
}
.page-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35}
.page-hero .hero-text{position:relative;z-index:1;padding:2rem 2.4rem;color:var(--white)}
.page-hero h2{font-size:1.9rem;font-family:var(--serif);line-height:1.2}
.page-hero p{font-size:.85rem;opacity:.75;margin-top:.3rem;letter-spacing:.06em;text-transform:uppercase}

/* ── Section ── */
.section{margin-bottom:2.8rem}
.section-title{
  font-size:1rem;font-weight:700;color:var(--blue);
  border-bottom:2px solid var(--border);padding-bottom:.5rem;margin-bottom:1.2rem;
  display:flex;align-items:center;gap:.5rem;
}
.section-title::before{content:'';display:inline-block;width:4px;height:1.1rem;background:var(--accent);border-radius:2px}

/* ── Text layout ── */
.intro-box{
  background:var(--white);border-radius:10px;padding:2rem 2.4rem;
  border:1px solid var(--border);font-size:.95rem;line-height:1.85;white-space:pre-line;
}

/* ── Cards layout ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem}
.card{
  background:var(--white);border:1px solid var(--border);border-radius:10px;
  padding:1.2rem;display:flex;flex-direction:column;gap:.5rem;transition:box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px rgba(31,78,121,.12)}
.card img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.c-name{font-weight:700;font-size:1rem;color:var(--navy)}
.c-period{font-size:.78rem;color:var(--muted)}
.c-degree{font-size:.78rem;color:var(--sky)}
.c-specialty{font-size:.78rem;color:var(--text);background:var(--light);border-radius:6px;padding:.3rem .6rem;line-height:1.5;margin-top:.2rem}

/* ── Table layout ── */
.data-table{width:100%;border-collapse:collapse;font-size:.88rem}
.data-table th{background:var(--navy);color:var(--white);padding:.65rem 1rem;text-align:left;font-weight:600;font-size:.82rem}
.data-table td{padding:.6rem 1rem;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:hover td{background:var(--light)}
.badge{display:inline-block;border-radius:4px;padding:.15rem .5rem;font-size:.75rem;font-weight:700}
.badge-bs{background:#deeaf1;color:#1f4e79}
.badge-ms{background:#e2efda;color:#375623}
.badge-phd{background:#fce4d6;color:#7b2c2c}
.en-sub{color:var(--sky);font-size:.8rem;display:block;margin-top:.15rem}

/* ── Links layout ── */
.link-group{margin-bottom:2rem}
.link-cat-title{
  font-size:.85rem;font-weight:700;color:var(--white);background:var(--blue);
  padding:.35rem .8rem;border-radius:6px;display:inline-block;margin-bottom:.7rem;
}
.link-list{list-style:none}
.link-list li{border-bottom:1px solid var(--border);padding:.55rem 0;display:flex;align-items:flex-start;gap:.6rem;font-size:.9rem}
.link-list li:last-child{border-bottom:none}
.link-list a{color:var(--sky);text-decoration:none}
.link-list a:hover{text-decoration:underline}
.file-tag{flex-shrink:0;font-size:.68rem;font-weight:700;padding:.15rem .4rem;border-radius:4px;margin-top:.18rem}
.file-tag.PDF{background:#fce4d6;color:#c00000}
.file-tag.DOC{background:#deeaf1;color:#1f4e79}
.file-tag.連結{background:#e2efda;color:#375623}

/* ── Events layout ── */
.events-section{margin-bottom:2.2rem}
.events-cat-title{
  font-size:.85rem;font-weight:700;color:var(--white);background:var(--navy);
  padding:.35rem .8rem;border-radius:6px;display:inline-block;margin-bottom:.8rem;
}
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.8rem}
.event-card{
  background:var(--white);border:1px solid var(--border);border-radius:8px;
  padding:.9rem 1rem;display:flex;align-items:center;gap:.8rem;
  text-decoration:none;color:var(--text);transition:box-shadow .18s,border-color .18s;font-size:.88rem;
}
.event-card:hover{box-shadow:0 3px 12px rgba(31,78,121,.1);border-color:var(--sky);color:var(--sky)}
.ev-icon{font-size:1.3rem;flex-shrink:0}
.ev-tag{font-size:.7rem;color:var(--muted);display:block;margin-top:.1rem}

/* ── Responsive ── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;display:flex;overflow-x:auto;padding:.5rem 0}
  .nav-item{padding:.5rem .8rem;border-left:none;border-bottom:3px solid transparent;font-size:.8rem}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent)}
  .content{padding:1.5rem 1rem}
}
</style>
</head>
<body>

<!-- ── Welcome overlay ── -->
<div id="overlay">
  <div class="welcome-box">
    <div class="welcome-logo">物</div>
    <h2>國立中央大學物理學系</h2>
    <p class="welcome-sub">Department of Physics, National Central University</p>
    <div class="welcome-divider"></div>
    <p class="welcome-hint" id="overlay-hint">資料載入中...</p>
    <div class="welcome-spinner" id="overlay-spinner"></div>
    <label class="welcome-btn" id="overlay-btn" for="excel-file" style="display:none">
      <span>📂</span> 選取 dept_intro_data.xlsx
    </label>
    <input type="file" id="excel-file" accept=".xlsx,.xls" style="display:none">
    <p class="welcome-note" id="overlay-note" style="display:none">資料僅在本機讀取，不會上傳至任何伺服器</p>
  </div>
</div>

<!-- ── Header ── -->
<header class="site-header">
  <div class="logo-mark">物</div>
  <div class="titles">
    <h1>國立中央大學物理學系</h1>
    <p>Department of Physics, National Central University</p>
  </div>
  <span id="excel-status">載入中...</span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">系所簡介</div>
  </nav>
  <main class="content" id="main-content"></main>
</div>

<script>
const PLACEHOLDER_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23ddd'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-size='26' fill='%23999'%3E👤%3C/text%3E%3C/svg%3E";

// ── SheetJS 工具 ──────────────────────────────────────────────────────────
function sheetToRows(ws) {
  return XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
}

// ── 渲染：text ────────────────────────────────────────────────────────────
function renderText(text) {
  const box = document.createElement('div');
  box.className = 'intro-box';
  box.textContent = text;
  return box;
}

// ── 渲染：cards ───────────────────────────────────────────────────────────
// 欄位：姓名 / 服務起 / 服務迄 / 最高學歷 / 專長 / 照片URL
function renderCards(rows) {
  const grid = document.createElement('div');
  grid.className = 'cards-grid';
  rows.forEach(r => {
    const [name, from, to, degree, specialty, photo] = r;
    if (!name) return;
    const period = String(to) === '迄今' ? `${from} 迄今` : `${from} — ${to}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${photo || PLACEHOLDER_IMG}" alt="${name}"
           onerror="this.src='${PLACEHOLDER_IMG}'">
      <div class="c-name">${name}</div>
      <div class="c-period">🗓 ${period}</div>
      ${degree    ? `<div class="c-degree">🎓 ${degree}</div>` : ''}
      ${specialty ? `<div class="c-specialty">${specialty}</div>` : ''}`;
    grid.appendChild(card);
  });
  return grid;
}

// ── 渲染：table ───────────────────────────────────────────────────────────
// 欄位：群組標籤 / 名稱 / 英文名稱 / 說明
function renderTable(rows) {
  const BADGE = { '學士':'bs', '碩士':'ms', '博士':'phd' };
  let curGroup = '';
  const wrap = document.createElement('div');
  const table = document.createElement('table');
  table.className = 'data-table';
  let tbody = '<tbody>';
  rows.forEach(r => {
    if (!r.some(v => v)) return;
    if (r[0]) curGroup = String(r[0]);
    const cls = BADGE[curGroup] || '';
    const cells = r.map((v, i) => {
      if (i === 0) return `<td>${v ? `<span class="badge badge-${cls}">${v}</span>` : ''}</td>`;
      if (i === 1) return `<td><strong>${v}</strong></td>`;
      if (i === 2) return `<td><span class="en-sub">${v}</span></td>`;
      return `<td>${v}</td>`;
    }).join('');
    tbody += `<tr>${cells}</tr>`;
  });
  tbody += '</tbody>';
  table.innerHTML = tbody;
  wrap.appendChild(table);
  return wrap;
}

// ── 渲染：links ───────────────────────────────────────────────────────────
// 欄位：分類 / 名稱 / URL / 檔案類型
function renderLinks(rows) {
  const wrap = document.createElement('div');
  const groups = {}, order = [];
  rows.forEach(r => {
    const [cat, name, url, type] = r;
    if (!name && !url) return;
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push({ name, url, type });
  });
  order.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'link-group';
    const items = groups[cat].map(it => {
      const tag = it.type === 'OTD' || it.type === 'ODT' ? 'DOC'
                : ['PDF','DOC','連結'].includes(it.type) ? it.type : '連結';
      return `<li>
        <span class="file-tag ${tag}">${tag}</span>
        ${it.sub ? `<span class="sub-tag">${it.sub}</span>` : ''}
        <a href="${it.url}" target="_blank" rel="noopener">${it.name}</a>
      </li>`;
    }).join('');
    sec.innerHTML = `<div class="link-cat-title">${cat}</div><ul class="link-list">${items}</ul>`;
    wrap.appendChild(sec);
  });
  return wrap;
}

// ── 渲染：events ──────────────────────────────────────────────────────────
// 欄位：分類 / 標題 / URL / 類型
function renderEvents(rows) {
  const ICONS = { 'YouTube':'▶️', 'Google相簿':'🖼️' };
  const wrap = document.createElement('div');
  const groups = {}, order = [];
  rows.forEach(r => {
    const [cat, title, url, type] = r;
    if (!title) return;
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push({ title, url, type });
  });
  order.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'events-section';
    const cards = groups[cat].map(it =>
      `<a class="event-card" href="${it.url}" target="_blank" rel="noopener">
        <span class="ev-icon">${ICONS[it.type] || '🔗'}</span>
        <span>${it.title}<span class="ev-tag">${it.type}</span></span>
      </a>`).join('');
    sec.innerHTML = `<div class="events-cat-title">${cat}</div><div class="events-grid">${cards}</div>`;
    wrap.appendChild(sec);
  });
  return wrap;
}

// ── 導覽切換 ──────────────────────────────────────────────────────────────
function switchPage(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const ni = document.querySelector(`.nav-item[data-page="${id}"]`);
  const pg = document.getElementById('page-' + id);
  if (ni) ni.classList.add('active');
  if (pg) pg.classList.add('active');
}

// ── 處理 Workbook ─────────────────────────────────────────────────────────
function processWorkbook(wb) {
  const cfgSheet = wb.Sheets['頁面設定'];
  if (!cfgSheet) { alert('找不到「頁面設定」工作頁！'); return; }

  const cfgRows = sheetToRows(cfgSheet);
  const HEAD = cfgRows[0].map(h => String(h).trim());
  const col  = k => HEAD.indexOf(k);
  const C = {
    id:        col('分頁ID'),
    title:     col('分頁標題'),
    heroImg:   col('頁首圖URL'),
    heroH2:    col('頁首大標題'),
    heroSub:   col('頁首副標題'),
    layout:    col('版面類型'),
    dataSheet: col('資料工作頁'),
    intro:     col('說明文字'),
    order:     col('排列順序'),
    enabled:   col('啟用'),
  };

  const pages = cfgRows.slice(2)
    .filter(r => r[C.id] && String(r[C.enabled]).toUpperCase() !== 'FALSE')
    .sort((a, b) => Number(a[C.order] || 99) - Number(b[C.order] || 99));

  const sidebar = document.getElementById('sidebar');
  const main    = document.getElementById('main-content');
  sidebar.innerHTML = '<div class="sidebar-label">系所簡介</div>';
  main.innerHTML    = '';

  pages.forEach((row, idx) => {
    const id        = String(row[C.id]).trim();
    const title     = String(row[C.title]).trim();
    const heroImg   = String(row[C.heroImg] || '').trim();
    const heroH2    = String(row[C.heroH2]  || title).trim();
    const heroSub   = String(row[C.heroSub] || '').trim();
    const layout    = String(row[C.layout]  || '').trim().toLowerCase();
    const dataSheet = String(row[C.dataSheet] || '').trim();
    const introText = String(row[C.intro]   || '').trim();

    // Sidebar nav
    const navItem = document.createElement('div');
    navItem.className = 'nav-item' + (idx === 0 ? ' active' : '');
    navItem.dataset.page = id;
    navItem.textContent = title;
    navItem.addEventListener('click', () => switchPage(id));
    sidebar.appendChild(navItem);

    // Page panel
    const panel = document.createElement('div');
    panel.className = 'page' + (idx === 0 ? ' active' : '');
    panel.id = 'page-' + id;

    // Hero
    const heroEl = document.createElement('div');
    heroEl.className = 'page-hero';
    if (heroImg) {
      const img = document.createElement('img');
      img.src = heroImg; img.alt = '';
      heroEl.appendChild(img);
    }
    const heroText = document.createElement('div');
    heroText.className = 'hero-text';
    heroText.innerHTML = `<h2>${heroH2}</h2>${heroSub ? `<p>${heroSub}</p>` : ''}`;
    heroEl.appendChild(heroText);
    panel.appendChild(heroEl);

    // Intro
    if (introText) {
      const box = renderText(introText);
      box.style.marginBottom = '2rem';
      panel.appendChild(box);
    }

    // Content
    const dataRows = dataSheet && wb.Sheets[dataSheet]
      ? sheetToRows(wb.Sheets[dataSheet]).slice(1)
      : [];

    switch (layout) {
      case 'cards':  panel.appendChild(renderCards(dataRows));  break;
      case 'table':  panel.appendChild(renderTable(dataRows));  break;
      case 'links':  panel.appendChild(renderLinks(dataRows));  break;
      case 'events': panel.appendChild(renderEvents(dataRows)); break;
    }

    main.appendChild(panel);
  });

  // 隱藏 overlay
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('excel-status').style.color = '#a6e3a1';
}

// ── GitHub API：取 Excel 最後 commit 時間 ─────────────────────────────────
async function getCommitDate(owner, repo, path) {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/commits?path=${path}&per_page=1`,
      { headers: { 'Accept': 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.length ? new Date(data[0].commit.committer.date) : null;
  } catch { return null; }
}

// ── 顯示上傳日期（台灣時間 UTC+8）────────────────────────────────────────
function showCommitDate(date) {
  if (!date) return;
  const tw  = new Date(date.getTime() + 8 * 60 * 60 * 1000);
  const pad = n => String(n).padStart(2, '0');
  const str = `${tw.getUTCFullYear()}-${pad(tw.getUTCMonth()+1)}-${pad(tw.getUTCDate())} ${pad(tw.getUTCHours())}:${pad(tw.getUTCMinutes())}`;
  document.getElementById('excel-status').textContent = '✓ 更新　' + str;
}

// ── 手動選取 ──────────────────────────────────────────────────────────────
document.getElementById('excel-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      processWorkbook(wb);
      document.getElementById('excel-status').textContent = '✓ 已載入（本機）';
    } catch(err) { alert('讀取 Excel 失敗：' + err.message); }
  };
  reader.readAsBinaryString(file);
});

// ── 自動載入 ──────────────────────────────────────────────────────────────
async function autoLoad() {
  try {
    const [res, commitDate] = await Promise.all([
      fetch('dept_intro_data.xlsx?v=' + Date.now()),
      getCommitDate('ncuphysics1986', 'phys.ncu.test', 'dept_intro_data.xlsx')
    ]);
    if (!res.ok) throw new Error('not found');
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(buf, { type: 'array' });
    processWorkbook(wb);
    showCommitDate(commitDate);
  } catch {
    // 自動載入失敗 → 顯示手動選取
    document.getElementById('overlay-hint').textContent = '找不到資料檔，請手動選取';
    document.getElementById('overlay-spinner').style.display = 'none';
    document.getElementById('overlay-btn').style.display = 'inline-flex';
    document.getElementById('overlay-note').style.display = 'block';
  }
}

window.addEventListener('DOMContentLoaded', autoLoad);
</script>
</body>
